version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: gylfa_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - gylfa_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gylfa_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=gylfa
      - JWT_SECRET=supersecretjwtkeygylfa123
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_EMAIL=admin@gylfa.app
      - ADMIN_PASSWORD=admin123
      - DEMO_EMAIL=demo@gylfa.app
      - DEMO_PASSWORD=demo123
      - RESEND_API_KEY=
      - EMAIL_FROM=Gylfa <onboarding@resend.dev>
      - DIGEST_ENABLED=true
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - gylfa_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gylfa_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - gylfa_network

volumes:
  mongo_data:

networks:
  gylfa_network:
    driver: bridge
