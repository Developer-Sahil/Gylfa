version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gylfa_backend
    ports:
      - "8000:8000"
    environment:
      - FIREBASE_SERVICE_ACCOUNT=/app/firebase-service-account.json
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@gylfa.app}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DEMO_EMAIL=${DEMO_EMAIL:-demo@gylfa.app}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-demo123}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-Gylfa <onboarding@resend.dev>}
      - DIGEST_ENABLED=${DIGEST_ENABLED:-true}
    volumes:
      # Mount the service account key at runtime — never bake secrets into the image
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - gylfa_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gylfa_frontend
    ports:
      - "3000:80"
    environment:
      # Note: React env vars must be set at BUILD time (baked in during npm run build).
      # For local Docker use, rebuild the image after changing these.
      - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8000}
      - REACT_APP_FIREBASE_API_KEY=${REACT_APP_FIREBASE_API_KEY}
      - REACT_APP_FIREBASE_AUTH_DOMAIN=${REACT_APP_FIREBASE_AUTH_DOMAIN}
      - REACT_APP_FIREBASE_PROJECT_ID=${REACT_APP_FIREBASE_PROJECT_ID}
      - REACT_APP_FIREBASE_STORAGE_BUCKET=${REACT_APP_FIREBASE_STORAGE_BUCKET}
      - REACT_APP_FIREBASE_MESSAGING_SENDER_ID=${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}
      - REACT_APP_FIREBASE_APP_ID=${REACT_APP_FIREBASE_APP_ID}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gylfa_network

networks:
  gylfa_network:
    driver: bridge
